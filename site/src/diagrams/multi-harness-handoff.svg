<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="auto" role="img" aria-labelledby="hl-title hl-desc" font-family="Inter, system-ui, sans-serif">
  <title id="hl-title">The handoff lifecycle</title>
  <desc id="hl-desc">A left to right pipeline: a session discovers knowledge, writes a handoff, an ingester processes it, producing cards and the memory index.</desc>
  <defs>
    <marker id="hl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
    </marker>
  </defs>

  <!-- caption -->
  <text x="40" y="38" font-size="11" letter-spacing="0.16em" fill="#d4a017" font-weight="600">THE HANDOFF LIFECYCLE</text>
  <line x1="40" y1="50" x2="560" y2="50" stroke="#d8d8d2" stroke-width="1" />

  <!-- baseline track -->
  <line x1="64" y1="160" x2="536" y2="160" stroke="#d8d8d2" stroke-width="1" />

  <!-- stage 1 -->
  <g>
    <rect x="40" y="120" width="112" height="80" rx="8" fill="#f6f6f4" stroke="#d8d8d2" stroke-width="1" />
    <text x="96" y="112" font-size="9" letter-spacing="0.12em" fill="#6b7280" text-anchor="middle">STAGE 01</text>
    <text x="96" y="156" font-size="11" fill="#1a1a1a" text-anchor="middle">Session</text>
    <text x="96" y="172" font-size="11" fill="#1a1a1a" text-anchor="middle">discovers</text>
    <text x="96" y="188" font-size="11" fill="#1a1a1a" text-anchor="middle">knowledge</text>
  </g>

  <!-- stage 2 -->
  <g>
    <rect x="190" y="120" width="112" height="80" rx="8" fill="#f6f6f4" stroke="#d8d8d2" stroke-width="1" />
    <text x="246" y="112" font-size="9" letter-spacing="0.12em" fill="#6b7280" text-anchor="middle">STAGE 02</text>
    <text x="246" y="164" font-size="11" fill="#1a1a1a" text-anchor="middle">Writes</text>
    <text x="246" y="180" font-size="11" fill="#1a1a1a" text-anchor="middle">handoff</text>
  </g>

  <!-- stage 3 (gold accent) -->
  <g>
    <rect x="340" y="116" width="112" height="88" rx="8" fill="#ffffff" stroke="#d4a017" stroke-width="2" />
    <text x="396" y="108" font-size="9" letter-spacing="0.12em" fill="#d4a017" text-anchor="middle">STAGE 03</text>
    <text x="396" y="162" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">Ingester</text>
    <text x="396" y="180" font-size="8.5" fill="#6b7280" text-anchor="middle">routes + dedupes</text>
  </g>

  <!-- stage 4 -->
  <g>
    <rect x="490" y="120" width="70" height="80" rx="8" fill="#f6f6f4" stroke="#d8d8d2" stroke-width="1" />
    <text x="525" y="112" font-size="9" letter-spacing="0.12em" fill="#6b7280" text-anchor="middle">STAGE 04</text>
    <text x="525" y="156" font-size="11" fill="#1a1a1a" text-anchor="middle">Cards</text>
    <text x="525" y="172" font-size="9" fill="#6b7280" text-anchor="middle">+</text>
    <text x="525" y="188" font-size="11" fill="#1a1a1a" text-anchor="middle">index</text>
  </g>

  <!-- connecting arrows -->
  <g fill="none" stroke="#6b7280" stroke-width="1.25">
    <line x1="152" y1="160" x2="186" y2="160" marker-end="url(#hl-arrow)" />
    <line x1="302" y1="160" x2="336" y2="160" marker-end="url(#hl-arrow)" />
    <line x1="452" y1="160" x2="486" y2="160" marker-end="url(#hl-arrow)" />
  </g>

  <!-- output label -->
  <text x="525" y="226" font-size="8.5" letter-spacing="0.1em" fill="#6b7280" text-anchor="middle">MEMORY.md</text>
</svg>
