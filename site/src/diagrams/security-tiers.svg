<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="auto" role="img" aria-labelledby="se-title se-desc" font-family="Inter, system-ui, sans-serif">
  <title id="se-title">Read, safe-write, destructive: gate every tier</title>
  <desc id="se-desc">Three stacked permission tiers. Read access is open. Safe-write is gated by one lock. Destructive is double-gated by two locks. Gold gating boundaries separate the tiers.</desc>
  <defs>
    <!-- simple lock glyph: shackle arc + body -->
    <g id="se-lock">
      <rect x="-7" y="0" width="14" height="11" rx="2" fill="#d4a017" />
      <path d="M-4,0 V-3 a4,4 0 0 1 8,0 V0" fill="none" stroke="#d4a017" stroke-width="1.6" />
      <circle cx="0" cy="5" r="1.4" fill="#ffffff" />
    </g>
  </defs>

  <!-- caption -->
  <text x="40" y="34" font-size="11" letter-spacing="0.13em" fill="#d4a017" font-weight="600">READ, SAFE-WRITE, DESTRUCTIVE: GATE EVERY TIER</text>
  <line x1="40" y1="46" x2="560" y2="46" stroke="#d8d8d2" stroke-width="1" />

  <!-- Tier 1: Read (open) -->
  <g>
    <rect x="120" y="74" width="360" height="74" rx="8" fill="#f6f6f4" stroke="#d8d8d2" stroke-width="1" />
    <text x="144" y="104" font-size="9" letter-spacing="0.14em" fill="#6b7280">TIER 01</text>
    <text x="144" y="126" font-size="14" font-weight="600" fill="#1a1a1a">Read</text>
    <text x="456" y="118" font-size="10" fill="#6b7280" text-anchor="end">open</text>
  </g>

  <!-- gate boundary 1 (gold) -->
  <g>
    <line x1="120" y1="162" x2="480" y2="162" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="5 4" />
    <use href="#se-lock" x="300" y="156" />
    <text x="318" y="166" font-size="8.5" fill="#d4a017">gate</text>
  </g>

  <!-- Tier 2: Safe-write (gated) -->
  <g>
    <rect x="120" y="176" width="360" height="74" rx="8" fill="#f6f6f4" stroke="#d8d8d2" stroke-width="1" />
    <text x="144" y="206" font-size="9" letter-spacing="0.14em" fill="#6b7280">TIER 02</text>
    <text x="144" y="228" font-size="14" font-weight="600" fill="#1a1a1a">Safe-write</text>
    <use href="#se-lock" x="440" y="206" />
    <text x="456" y="234" font-size="10" fill="#6b7280" text-anchor="end">gated</text>
  </g>

  <!-- gate boundary 2 (gold, double) -->
  <g>
    <line x1="120" y1="264" x2="480" y2="264" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="5 4" />
    <use href="#se-lock" x="289" y="258" />
    <use href="#se-lock" x="311" y="258" />
    <text x="330" y="268" font-size="8.5" fill="#d4a017">double gate</text>
  </g>

  <!-- Tier 3: Destructive (double-gated) -->
  <g>
    <rect x="120" y="278" width="360" height="74" rx="8" fill="#ffffff" stroke="#d4a017" stroke-width="2" />
    <text x="144" y="308" font-size="9" letter-spacing="0.14em" fill="#d4a017">TIER 03</text>
    <text x="144" y="330" font-size="14" font-weight="600" fill="#1a1a1a">Destructive</text>
    <use href="#se-lock" x="422" y="308" />
    <use href="#se-lock" x="444" y="308" />
    <text x="456" y="336" font-size="10" fill="#6b7280" text-anchor="end">double-gated</text>
  </g>

  <!-- access axis arrow -->
  <g>
    <line x1="92" y1="84" x2="92" y2="344" stroke="#6b7280" stroke-width="1.25" />
    <path d="M92,344 l-3.5,-7 l7,0 z" fill="#6b7280" />
    <path d="M92,84 l-3.5,7 l7,0 z" fill="#6b7280" />
    <text x="84" y="218" font-size="8.5" letter-spacing="0.12em" fill="#6b7280" text-anchor="middle" transform="rotate(-90 84 218)">RISING RISK</text>
  </g>

  <!-- footnote -->
  <text x="120" y="380" font-size="8.5" fill="#6b7280">Every step down the stack adds a gate. Nothing destructive runs un-prompted.</text>
</svg>
